name: Build WebCompiler

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 1: Generate debug keystore for template signing
      - name: Generate template debug keystore
        run: |
          keytool -genkey -v -keystore WebViewTemplate/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=Debug, OU=Dev, O=WebCompiler, L=City, ST=State, C=US"

      # Step 2: Build WebViewTemplate → template.apk (signed with debug key)
      - name: Build template APK
        run: |
          cd WebViewTemplate
          chmod +x gradlew
          ./gradlew assembleRelease
          mkdir -p ../WebCompilerApp/app/src/main/assets
          APK=$(find app/build/outputs -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found in build outputs"
            exit 1
          fi
          echo "Found APK: $APK"
          cp "$APK" ../WebCompilerApp/app/src/main/assets/template.apk

      # Step 3: Generate debug keystore for WebCompilerApp signing
      - name: Generate WebCompilerApp debug keystore
        run: |
          keytool -genkey -v -keystore WebCompilerApp/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=Debug, OU=Dev, O=WebCompiler, L=City, ST=State, C=US"

      # Step 4: Build WebCompilerApp (signed with debug key)
      - name: Build WebCompilerApp APK
        run: |
          cd WebCompilerApp
          chmod +x gradlew
          ./gradlew assembleRelease

      # Step 5: Upload APK
      - uses: actions/upload-artifact@v4
        with:
          name: WebCompiler-APK
          path: WebCompilerApp/app/build/outputs/apk/release/*.apk
